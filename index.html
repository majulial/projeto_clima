<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Previsão do Tempo</title>
  <link rel="icon" href="./assets/images/favicon.svg">

   <!-- Biblioteca Weather Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/weather-icons/2.0.12/css/weather-icons.min.css">

    <!-- Google Fonts: Poppins -->

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Sora:wght@300;400;600&display=swap" rel="stylesheet">

   <!-- CSS -->
  <link rel="stylesheet" href="./assets/css/style.css">


</head>
<body>


<div id="clima-bg" class="clima-bg"></div>

  <main class="app">
    <section class="card">

      <!-- TELA INICIAL -->
      <section id="tela-inicial" class="screen active">

        

        <div class="logo">
          <div class="olho-elegante">
  <div class="iris"></div>
</div>
  <!-- <div class="soll"></div>
  <div class="linha"></div>
  <div class="linha pequena"></div> -->
</div>
        <h1 class="title">Olho no tempo.</h1>

        <div class="search-box">
          <!-- Campo onde o usuário digita o nome da cidade -->
          <input
            type="text"
            id="cidade"
            class="search-input"
            placeholder="Digite o nome da cidade"
          >

            <!-- Mensagem de erro: começa escondida -->
        <div id="mensagem-erro" class="error-message hidden">
          Cidade não encontrada. Tente novamente.
        </div>


             <!-- Mensagem de carregamento -->
        <div id="mensagem-carregando" class="loading-message hidden">
    Buscando informações...
      </div>
      

          <!-- Botão para iniciar a busca -->
          <button id="buscar" class="search-button">Buscar</button>
        </div>

       

      
      </section>

      <!-- TELA DE RESULTADO -->
      <section id="tela-resultado" class="screen hidden">
        <div class="weather-box">
          <!-- Ícone SVG do clima -->
         <!-- Ícone do clima usando Weather Icons -->
            <i id="icone-clima" class="weather-icon wi wi-day-cloudy" aria-hidden="true"></i>

          <!-- Temperatura -->
          <h2 id="temperatura" class="temperature">21°</h2>
        </div>

        <!-- Nome da cidade -->
        <h3 id="cidade-resultado" class="city-name">São Paulo, Brasil</h3>

        <!-- Descrição do clima -->
        <p id="descricao-clima" class="weather-description">Nublado</p>

        <!-- Data atual -->
        <p id="data-atual" class="weather-date">segunda-feira, 13 de outubro de 2025</p>

        <!-- Card com temperatura máxima e mínima do dia -->
<div class="temp-range-card">
  <div class="temp-range-item">
    <p class="temp-range-label">Máxima</p>
    <p id="temperatura-max" class="temp-range-value">--°</p>
  </div>

  <div class="temp-range-divider"></div>

  <div class="temp-range-item">
    <p class="temp-range-label">Mínima</p>
    <p id="temperatura-min" class="temp-range-value">--°</p>
  </div>
</div>


          <!-- Área com informações complementares do clima -->
   <div class="weather-details">

    <!-- Card da umidade -->
    <div class="detail-card">
      <i class="wi wi-humidity detail-icon"></i>
      <p class="detail-label">Umidade</p>
      <p id="umidade" class="detail-value">--%</p>
    </div>

    <!-- Card da velocidade do vento -->
    <div class="detail-card">
      <i class="wi wi-strong-wind detail-icon"></i>
      <p class="detail-label">Vento</p>
      <p id="vento" class="detail-value">-- km/h</p>
    </div>

    <!-- Card da sensação térmica -->
    <div class="detail-card">
      <i class="wi wi-thermometer detail-icon"></i>
      <p class="detail-label">Sensação</p>
      <p id="sensacao" class="detail-value">--°</p>
    </div>

  </div>

        <!-- Botão de voltar para a tela inicial -->
        <button id="voltar" class="home-button" aria-label="Voltar para a busca">
          <img src="./assets/images/home.svg" alt="Voltar">
        </button>
      </section>

    </section>
  </main>

  <script src="./assets/js/script.js"></script>

</body>
</html>
